<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizar - VibeVault</title>
    <link rel="stylesheet" href="css/visualizar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <header>
        <a href="index.html"><i class="bi bi-box-arrow-left"></i></a>
    </header>
    <div class="player">

        <div class="card">

            <img src="imagens/nossa-praia.jpg" class="capa">

            <div class="info">
                <h2>Nossa Praia</h2>
                <p>Matheus e Kauan</p>
            </div>

            <div class="progresso">
                <span>00:00</span>
                <div class="barra">
                    <div class="barra-fill"></div>
                </div>
                <span>3:45</span>
            </div>

            <div class="controles">
                <button><i class="bi bi-skip-start-fill"></i></button>
                <button class="play"><i class="bi bi-play-circle-fill"></i></button>
                <button><i class="bi bi-skip-end-fill"></i></button>
            </div>
        </div>
        <div class="detalhes">
            <h2>Detalhes</h2>
            <div class="link">
                <h4>Link da Música</h3>
                    <a href="https://youtu.be/_v0-5QY6y-M?si=HIR0x73wBJjLPUcj">
                        Ouvir agora no Youtube <i class="bi bi-youtube"></i>
                    </a>
            </div>
            <div class="genero">
                <h4>Gênero</h4>
                <span>Sertanejo</span>
            </div>
        </div>
    </div>

</body>

</html>
